<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialHub - Connect & Share</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            color: #fff;
            font-size: 40px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .header p {
            color: #e0e0e0;
            font-size: 16px;
            font-weight: 300;
        }

        .post-creator {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease 0.1s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-creator-header {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }

        .user-avatar-create {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            flex-shrink: 0;
        }

        .username-input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .username-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .post-creator textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s, box-shadow 0.3s;
            margin-bottom: 12px;
        }

        .post-creator textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .post-creator-actions {
            display: flex;
            gap: 10px;
        }

        .post-creator button {
            flex: 1;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        }

        .post-creator button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .post-creator button:active {
            transform: translateY(0);
        }

        .post-creator button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.6s ease 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .post {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: postEnter 0.5s ease;
        }

        @keyframes postEnter {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
        }

        .post-header {
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #f5f5f5;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            flex-shrink: 0;
            animation: avatarRotate 3s ease-in-out infinite;
        }

        @keyframes avatarRotate {
            0%, 100% {
                transform: rotate(0deg);
            }
            50% {
                transform: rotate(5deg);
            }
        }

        .post-user-info {
            flex: 1;
        }

        .post-user-info h3 {
            font-size: 16px;
            color: #1a1a1a;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .post-user-info p {
            font-size: 13px;
            color: #999;
        }

        .post-delete {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
            transition: color 0.3s;
        }

        .post-delete:hover {
            color: #e74c3c;
        }

        .post-content {
            padding: 15px 25px;
            line-height: 1.6;
            color: #333;
            word-wrap: break-word;
        }

        .post-image {
            width: 100%;
            height: 320px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientFlow 12s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .emoji-float {
            position: absolute;
            font-size: 50px;
            opacity: 0.9;
        }

        .emoji-float:nth-child(1) {
            animation: floatEmoji1 6s ease-in-out infinite;
        }

        .emoji-float:nth-child(2) {
            animation: floatEmoji2 7s ease-in-out infinite;
        }

        .emoji-float:nth-child(3) {
            animation: floatEmoji3 8s ease-in-out infinite;
        }

        @keyframes floatEmoji1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, -50px) scale(0.95); }
            75% { transform: translate(40px, -20px) scale(1.05); }
        }

        @keyframes floatEmoji2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-40px, -20px) scale(1.05); }
            50% { transform: translate(30px, -40px) scale(0.9); }
            75% { transform: translate(-30px, -30px) scale(1.1); }
        }

        @keyframes floatEmoji3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(20px, -40px) scale(0.95); }
            50% { transform: translate(-30px, -20px) scale(1.1); }
            75% { transform: translate(50px, -50px) scale(1.0); }
        }

        .post-actions {
            padding: 15px 25px;
            display: flex;
            gap: 30px;
            border-top: 1px solid #f5f5f5;
        }

        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #888;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            padding: 5px 10px;
            border-radius: 6px;
        }

        .action-btn:hover {
            background: #f5f5f5;
            color: #667eea;
        }

        .action-btn.liked {
            color: #e74c3c;
        }

        .action-btn.liked:hover {
            background: #ffe6e6;
        }

        .like-icon {
            font-size: 18px;
            transition: transform 0.3s;
        }

        .action-btn.liked .like-icon {
            animation: beatHeart 0.6s;
        }

        @keyframes beatHeart {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
        }

        .comments-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            border-top: 1px solid #f5f5f5;
        }

        .comments-section.active {
            max-height: 500px;
        }

        .comments-container {
            padding: 15px 25px;
        }

        .comment {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            animation: commentSlide 0.3s ease;
        }

        @keyframes commentSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .comment-author {
            font-weight: 600;
            color: #667eea;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .comment-text {
            color: #555;
            font-size: 13px;
            line-height: 1.5;
        }

        .comment-input-wrapper {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .comment-input-wrapper input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
            transition: border-color 0.3s;
        }

        .comment-input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }

        .comment-input-wrapper button {
            padding: 10px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.3s;
        }

        .comment-input-wrapper button:hover {
            background: #5568d3;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 10px;
        }

        @media (max-width: 640px) {
            .header h1 {
                font-size: 32px;
            }

            .post-creator {
                padding: 20px;
            }

            .post {
                border-radius: 12px;
            }

            .post-image {
                height: 250px;
            }

            .emoji-float {
                font-size: 40px;
            }

            .action-btn {
                gap: 5px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SocialHub</h1>
            <p>Connect, Share & Inspire in Real Time</p>
        </div>

        <div class="post-creator">
            <div class="post-creator-header">
                <div class="user-avatar-create" id="creatorAvatar">Y</div>
                <input type="text" id="usernameInput" class="username-input" placeholder="Enter your name...">
            </div>
            <textarea id="postContent" placeholder="What's on your mind? Share your thoughts..."></textarea>
            <div class="post-creator-actions">
                <button onclick="createPost()">Post Now</button>
            </div>
        </div>

        <div class="feed" id="feed"></div>
        <div id="emptyState" class="empty-state">
            <p>Be the first to share something!</p>
        </div>
    </div>

    <script>
        const EMOJIS = ['🎨', '🎭', '🎪', '🎬', '🎯', '🎲', '🎮', '🎸', '🎺', '🎻', '🎹', '🎤', '🎧', '🎼', '🚀', '✨', '🌟', '💫', '⭐', '🌈', '🔥', '💎', '🌺', '🌸', '🌼', '🌻', '🦋', '🐝', '🦄', '🎃', '🎉', '🎊', '💝', '💖', '🌙', '☀️', '🌊', '🏔️', '🌲', '🌴'];

        let posts = [];
        let username = localStorage.getItem('socialHubUsername') || 'Anonymous';

        function initApp() {
            loadPosts();
            setupUsernameInput();
            updateCreatorAvatar();
            renderFeed();
            setInterval(renderFeed, 60000);
        }

        function setupUsernameInput() {
            const input = document.getElementById('usernameInput');
            input.value = username;
            input.addEventListener('change', (e) => {
                username = e.target.value || 'Anonymous';
                localStorage.setItem('socialHubUsername', username);
                updateCreatorAvatar();
                renderFeed();
            });
        }

        function updateCreatorAvatar() {
            document.getElementById('creatorAvatar').textContent = username.charAt(0).toUpperCase();
        }

        function getRandomEmoji() {
            return EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        }

        function getTimeString(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (seconds < 60) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;

            const date = new Date(timestamp);
            return date.toLocaleDateString();
        }

        function createPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content) {
                alert('Please write something to share!');
                return;
            }

            const post = {
                id: Date.now(),
                username: username || 'Anonymous',
                content: content,
                timestamp: Date.now(),
                likes: 0,
                liked: false,
                comments: [],
                emojis: [getRandomEmoji(), getRandomEmoji(), getRandomEmoji()]
            };

            posts.unshift(post);
            savePosts();
            document.getElementById('postContent').value = '';
            renderFeed();
        }

        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.liked = !post.liked;
                post.likes += post.liked ? 1 : -1;
                savePosts();
                renderFeed();
            }
        }

        function toggleComments(postId) {
            const section = document.getElementById(`comments-${postId}`);
            section.classList.toggle('active');
        }

        function addComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const text = input.value.trim();
            if (!text) return;

            const post = posts.find(p => p.id === postId);
            if (post) {
                post.comments.push({
                    id: Date.now(),
                    username: username || 'Anonymous',
                    text: text,
                    timestamp: Date.now()
                });
                input.value = '';
                savePosts();
                renderFeed();
                document.getElementById(`comments-${postId}`).classList.add('active');
            }
        }

        function deletePost(postId) {
            if (confirm('Delete this post?')) {
                posts = posts.filter(p => p.id !== postId);
                savePosts();
                renderFeed();
            }
        }

        function savePosts() {
            localStorage.setItem('socialHubPosts', JSON.stringify(posts));
        }

        function loadPosts() {
            const saved = localStorage.getItem('socialHubPosts');
            posts = saved ? JSON.parse(saved) : [];
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            const emptyState = document.getElementById('emptyState');

            if (posts.length === 0) {
                feed.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            feed.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="post-header">
                        <div class="avatar">${post.username.charAt(0).toUpperCase()}</div>
                        <div class="post-user-info">
                            <h3>${escapeHtml(post.username)}</h3>
                            <p>${getTimeString(post.timestamp)}</p>
                        </div>
                        <button class="post-delete" onclick="deletePost(${post.id})" title="Delete">✕</button>
                    </div>
                    <div class="post-content">
                        ${escapeHtml(post.content)}
                    </div>
                    <div class="post-image">
                        ${post.emojis.map(emoji => `<span class="emoji-float">${emoji}</span>`).join('')}
                    </div>
                    <div class="post-actions">
                        <button class="action-btn ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            <span class="like-icon">${post.liked ? '❤️' : '🤍'}</span>
                            <span>${post.likes}</span>
                        </button>
                        <button class="action-btn" onclick="toggleComments(${post.id})">
                            <span>💬</span>
                            <span>${post.comments.length}</span>
                        </button>
                    </div>
                    <div class="comments-section" id="comments-${post.id}">
                        <div class="comments-container">
                            ${post.comments.map(comment => `
                                <div class="comment">
                                    <div class="comment-author">${escapeHtml(comment.username)}</div>
                                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                                </div>
                            `).join('')}
                            <div class="comment-input-wrapper">
                                <input type="text" id="comment-input-${post.id}" placeholder="Write a comment..." onkeypress="if(event.key === 'Enter') addComment(${post.id})">
                                <button onclick="addComment(${post.id})">Reply</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        initApp();
    </script>
</body>
</html>
